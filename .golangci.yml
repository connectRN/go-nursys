# See https://golangci-lint.run/usage/configuration/
version: "2"
linters:
  enable:
    - revive # Runs "golint" (the official go linter). Might as well run this one too.
    - forbidigo # Forbids use of some idenifiers, by default fmt.Print*
    - zerologlint # Detects the wrong usage of zerolog when a user forgets to dispatch with Send or Msg.
  settings:
    revive:
      enable-default-rules: true
      rules:
        - name: error-strings
          disabled: true
    staticcheck:
      # This is the default exclusions plus ST1005 and QF1003 disabled 
      checks: ["all", "-ST1005", "-QF1003", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022", "-QF1008", "-QF1005", "-QF1001"]  
  exclusions:
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
      - comments
    rules:
      - linters:
          - dupl
          - errcheck
          - gocyclo
          - gosec
          - revive
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  # Maximum issues count per one linter. Set to 0 to disable. Default is 50.
  max-issues-per-linter: 0

  # Maximum count of issues with the same text. Set to 0 to disable. Default is 3.
  max-same-issues: 0

formatters:
  enable:
    - gofmt # Gofmt checks whether code was gofmt-ed.
  exclusions:
    paths:
      - third_party$
      - builtin$
      - examples$
